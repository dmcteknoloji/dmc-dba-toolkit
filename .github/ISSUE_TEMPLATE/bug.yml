name: Bug report
description: A script behaves incorrectly, errors out, or returns unexpected results.
labels: ["bug", "triage"]
body:
  - type: input
    id: script
    attributes:
      label: Script
      description: Path to the script (e.g. `mssql/performance/top-cpu-queries.sql`)
      placeholder: mssql/performance/top-cpu-queries.sql
    validations:
      required: true

  - type: dropdown
    id: engine
    attributes:
      label: Engine
      options:
        - SQL Server 2016
        - SQL Server 2017
        - SQL Server 2019
        - SQL Server 2022
        - Azure SQL Database
        - Azure SQL Managed Instance
        - Other (specify in description)
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behaviour
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual behaviour
      description: Include exact error message, unexpected rows, or screenshots.
    validations:
      required: true

  - type: textarea
    id: reproduce
    attributes:
      label: Steps to reproduce
      description: Workload context, permissions, anything peculiar about the instance.

  - type: checkboxes
    id: terms
    attributes:
      label: Confirmation
      options:
        - label: I have checked the script header for known limitations.
          required: true
        - label: I have searched existing issues for duplicates.
          required: true
