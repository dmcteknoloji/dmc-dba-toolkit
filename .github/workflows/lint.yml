name: Lint

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Opt into Node.js 24 for the JavaScript actions used below.
# Node 20 is being removed from GitHub-hosted runners in late 2026;
# this env var avoids a hard break when the deprecation lands and
# silences the runner-side warning today.
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  validate-headers:
    name: Validate script headers
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Run header validator
        run: python scripts/validate_headers.py

  sqlfluff:
    name: sqlfluff lint (non-blocking)
    runs-on: ubuntu-latest
    # sqlfluff's strict layout rules don't match our hand-formatted style
    # (box-art headers, vertical column alignment, multi-line CASE). We run
    # it for visibility but don't block CI on it. The header validator and
    # the script's own results are what guarantee correctness.
    continue-on-error: true
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Install sqlfluff
        run: pip install "sqlfluff==3.2.5"
      - name: Lint .sql files
        run: sqlfluff lint --disable-progress-bar . || true

  markdown-links:
    name: Markdown link check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: gaurav-nelson/github-action-markdown-link-check@v1
        with:
          use-quiet-mode: "yes"
          use-verbose-mode: "yes"
          config-file: ".github/markdown-link-check.json"
